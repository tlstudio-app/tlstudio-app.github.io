<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="T&amp;L Studio — We craft mobile experiences. Studio indépendant de développement d'applications mobiles."
        />
        <title>T&amp;L Studio</title>
        <meta name="google-site-verification" content="NDYfTuz67fHcSC0JtaJhmEgoCuURwqawcfbWYEo8Jmo" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #07040b;
                --surface: #110a18;
                --surface-alt: #180e22;
                --border: rgba(227, 32, 92, 0.12);
                --border-hover: rgba(227, 32, 92, 0.3);
                --pink: #e3205c;
                --cream: #feeed3;
                --beige: #f6d7b4;
                --muted: rgba(254, 238, 211, 0.4);
                --font: "B612", "Courier New", monospace;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family: var(--font);
                background-color: var(--bg);
                background-image: radial-gradient(
                    ellipse 90% 55% at 50% -5%,
                    rgba(163, 22, 66, 0.2) 0%,
                    transparent 65%
                );
                color: var(--cream);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* ── Header ── */
            header {
                padding: 52px 24px 0;
                text-align: center;
            }

            .studio-name {
                font-size: clamp(1.4rem, 3.5vw, 1.9rem);
                font-weight: 700;
                letter-spacing: 0.35em;
                text-transform: uppercase;
                color: var(--cream);
            }

            .studio-name .amp {
                color: var(--pink);
            }

            /* ── Tagline ── */
            .hero {
                padding: 20px 24px 60px;
                text-align: center;
            }

            .tagline {
                font-size: clamp(0.75rem, 2vw, 0.85rem);
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: var(--muted);
            }

            /* ── Main ── */
            main {
                flex: 1;
                width: 100%;
                max-width: 820px;
                margin: 0 auto;
                padding: 0 24px 88px;
            }

            .section-label {
                font-size: 0.65rem;
                letter-spacing: 0.35em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 20px;
            }

            /* ── App Card ── */
            .app-card {
                display: flex;
                align-items: center;
                gap: 32px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 32px;
                transition:
                    border-color 0.25s ease,
                    background 0.25s ease;
            }

            .app-card:hover {
                border-color: var(--border-hover);
                background: var(--surface-alt);
            }

            .app-icon {
                flex-shrink: 0;
                width: 100px;
                height: 100px;
                border-radius: 22px;
                overflow: hidden;
                box-shadow:
                    0 8px 40px rgba(0, 0, 0, 0.65),
                    0 0 0 1px rgba(255, 255, 255, 0.06);
            }

            .app-icon img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .app-content {
                flex: 1;
            }

            .app-name {
                font-size: 1.25rem;
                font-weight: 700;
                letter-spacing: 0.07em;
                color: var(--cream);
                margin-bottom: 10px;
            }

            .app-desc {
                font-size: 0.875rem;
                line-height: 1.65;
                color: var(--beige);
                opacity: 0.8;
                margin-bottom: 24px;
            }

            /* ── Store buttons ── */
            .store-btns {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
            }

            .store-btn {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                background: var(--cream);
                color: var(--bg);
                text-decoration: none;
                padding: 10px 18px;
                border-radius: 10px;
                font-family: var(--font);
                transition:
                    opacity 0.2s ease,
                    transform 0.2s ease;
            }

            .store-btn:hover:not([aria-disabled="true"]) {
                opacity: 0.86;
                transform: translateY(-1px);
            }

            .store-btn[aria-disabled="true"] {
                opacity: 0.35;
                cursor: default;
                pointer-events: none;
            }

            .store-btn svg {
                flex-shrink: 0;
            }

            .store-btn-label {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                line-height: 1.25;
            }

            .store-btn-sub {
                font-size: 0.62rem;
                font-weight: 400;
                letter-spacing: 0.06em;
                opacity: 0.65;
            }

            .store-btn-main {
                font-size: 0.88rem;
                font-weight: 700;
                letter-spacing: 0.03em;
            }

            /* ── Footer ── */
            footer {
                border-top: 1px solid rgba(254, 238, 211, 0.06);
                padding: 32px 24px;
                text-align: center;
            }

            .footer-email {
                display: inline-block;
                font-size: 0.78rem;
                color: var(--muted);
                text-decoration: none;
                letter-spacing: 0.06em;
                margin-bottom: 12px;
                transition: color 0.2s ease;
            }

            .footer-email:hover {
                color: var(--beige);
            }

            .footer-copy {
                font-size: 0.65rem;
                color: var(--muted);
                letter-spacing: 0.12em;
                opacity: 0.55;
            }

            .footer-copy a {
                color: inherit;
                text-decoration: none;
            }

            .footer-copy a:hover {
                opacity: 0.8;
            }

            .footer-socials {
                display: flex;
                justify-content: center;
                gap: 16px;
                margin-bottom: 16px;
            }

            .footer-socials a {
                color: var(--muted);
                display: flex;
                transition: color 0.2s ease;
            }

            .footer-socials a:hover {
                color: var(--beige);
            }

            /* ── Responsive ── */
            @media (max-width: 540px) {
                .app-card {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 20px;
                    padding: 24px;
                }

                .app-icon {
                    width: 80px;
                    height: 80px;
                    border-radius: 18px;
                }
            }
        </style>
    </head>
